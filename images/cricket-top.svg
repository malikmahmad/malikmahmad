<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <radialGradient id="ballGrad" cx="42%" cy="38%" r="55%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="45%" style="stop-color:#922b21"/>
      <stop offset="100%" style="stop-color:#4a0a0a"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="35%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <filter id="ballShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c0000" flood-opacity="0.6"/>
    </filter>
    <filter id="seamGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ballClip">
      <circle cx="450" cy="80" r="68"/>
    </clipPath>
    <style>
      .ball-pulse { animation: ballPulse 3s ease-in-out infinite; transform-origin: 450px 80px; }
      @keyframes ballPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
      .seam-draw { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawSeam 2.5s ease forwards; }
      .seam-draw2 { stroke-dasharray: 300; stroke-dashoffset: 300; animation: drawSeam 2.5s ease 0.3s forwards; }
      @keyframes drawSeam { to { stroke-dashoffset: 0; } }
      .shine-pulse { animation: shinePulse 4s ease-in-out infinite; }
      @keyframes shinePulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
    </style>
  </defs>

  <!-- dark bg -->
  <rect width="900" height="160" fill="#0a0118"/>

  <!-- Ground shadow -->
  <ellipse cx="450" cy="152" rx="72" ry="10" fill="#000" opacity="0.4"/>

  <!-- Ball group with pulse -->
  <g class="ball-pulse" filter="url(#ballShadow)">
    <!-- Main ball -->
    <circle cx="450" cy="80" r="68" fill="url(#ballGrad)"/>
    <!-- Shine overlay -->
    <circle cx="450" cy="80" r="68" fill="url(#shineGrad)" class="shine-pulse"/>

    <!-- Seam: horizontal curve -->
    <path class="seam-draw" d="M 382 80 C 400 52, 440 48, 450 80 C 460 112, 500 108, 518 80"
      fill="none" stroke="#f5c6c6" stroke-width="2.2" filter="url(#seamGlow)" clip-path="url(#ballClip)"/>
    <!-- Seam: other horizontal curve (mirrored) -->
    <path class="seam-draw2" d="M 382 80 C 400 108, 440 112, 450 80 C 460 48, 500 52, 518 80"
      fill="none" stroke="#f5c6c6" stroke-width="2.2" filter="url(#seamGlow)" clip-path="url(#ballClip)"/>

    <!-- Seam stitches left side -->
    <g clip-path="url(#ballClip)" stroke="#f0a0a0" stroke-width="1.4" opacity="0.85">
      <line x1="400" y1="63" x2="404" y2="67"/>
      <line x1="408" y1="57" x2="412" y2="61"/>
      <line x1="416" y1="53" x2="420" y2="57"/>
      <line x1="400" y1="97" x2="404" y2="93"/>
      <line x1="408" y1="103" x2="412" y2="99"/>
      <line x1="416" y1="107" x2="420" y2="103"/>
    </g>
    <!-- Seam stitches right side -->
    <g clip-path="url(#ballClip)" stroke="#f0a0a0" stroke-width="1.4" opacity="0.85">
      <line x1="480" y1="63" x2="484" y2="67"/>
      <line x1="488" y1="57" x2="492" y2="61"/>
      <line x1="496" y1="53" x2="500" y2="57"/>
      <line x1="480" y1="97" x2="484" y2="93"/>
      <line x1="488" y1="103" x2="492" y2="99"/>
      <line x1="496" y1="107" x2="500" y2="103"/>
    </g>

    <!-- Leather panel division line (vertical) -->
    <line x1="450" y1="12" x2="450" y2="148"
      stroke="#7a1a1a" stroke-width="1.2" opacity="0.5" clip-path="url(#ballClip)"/>
  </g>
</svg>
