<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="avatarBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e0a3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0118;stop-opacity:1"/>
    </radialGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="150" cy="150" r="110"/>
    </clipPath>
  </defs>

  <!-- Outer pulsing glow -->
  <circle cx="150" cy="150" r="140" fill="#7c3aed" opacity="0.06">
    <animate attributeName="r" values="140;155;140" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.06;0.12;0.06" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Rotating outer ring -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="url(#ringGrad1)" stroke-width="2" stroke-dasharray="20 10" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 150 150" to="360 150 150" dur="12s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Counter rotating ring -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="url(#ringGrad2)" stroke-width="1.5" stroke-dasharray="15 15" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 150 150" to="0 150 150" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="112" fill="url(#avatarBg)"/>

  <!-- Code symbol avatar - professional dev illustration -->
  <!-- Face/head circle -->
  <circle cx="150" cy="130" r="55" fill="#1e1040" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Glowing screen / laptop representation -->
  <rect x="85" y="185" width="130" height="85" rx="8" fill="#120330" stroke="#a855f7" stroke-width="1.5"/>
  <rect x="90" y="190" width="120" height="70" rx="5" fill="#0d0221"/>
  
  <!-- Code lines on screen -->
  <rect x="96" y="198" width="50" height="4" rx="2" fill="#a855f7" opacity="0.8">
    <animate attributeName="width" values="50;70;50" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="96" y="208" width="70" height="4" rx="2" fill="#ec4899" opacity="0.7"/>
  <rect x="96" y="218" width="40" height="4" rx="2" fill="#7c3aed" opacity="0.9">
    <animate attributeName="width" values="40;60;40" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="96" y="228" width="60" height="4" rx="2" fill="#a855f7" opacity="0.6"/>
  <rect x="96" y="238" width="80" height="4" rx="2" fill="#ec4899" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Blinking cursor on screen -->
  <rect x="155" y="238" width="6" height="4" rx="1" fill="#a855f7">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Face features -->
  <!-- Eyes -->
  <circle cx="133" cy="118" r="6" fill="#a855f7" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="167" cy="118" r="6" fill="#a855f7" opacity="0.9" filter="url(#softGlow)"/>
  <!-- Pupils -->
  <circle cx="133" cy="118" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="167" cy="118" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Smile -->
  <path d="M 133 140 Q 150 155 167 140" stroke="#ec4899" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Small orbiting dots -->
  <circle cx="150" cy="150" r="3" fill="#a855f7" filter="url(#glow)">
    <animateMotion dur="5s" repeatCount="indefinite">
      <mpath href="#orbitPath1"/>
    </animateMotion>
  </circle>
  <circle cx="150" cy="150" r="2.5" fill="#ec4899" filter="url(#glow)">
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#orbitPath2"/>
    </animateMotion>
  </circle>

  <path id="orbitPath1" d="M 150 20 A 130 130 0 1 1 149.9 20" fill="none"/>
  <path id="orbitPath2" d="M 150 30 A 120 120 0 1 0 149.9 30" fill="none"/>

  <!-- Glowing bottom accent -->
  <ellipse cx="150" cy="268" rx="50" ry="4" fill="#a855f7" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="50;60;50" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Corner code decorations -->
  <text x="15" y="45" font-family="monospace" font-size="22" fill="#a855f7" opacity="0.4">&lt;/&gt;</text>
  <text x="240" y="285" font-family="monospace" font-size="18" fill="#ec4899" opacity="0.3">{ }</text>

  <!-- Floating mini particles -->
  <circle cx="50" cy="80" r="1.5" fill="#a855f7" opacity="0.7">
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="200" r="1.5" fill="#ec4899" opacity="0.6">
    <animate attributeName="cy" values="200;180;200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="70" r="1" fill="#a855f7" opacity="0.8">
    <animate attributeName="cy" values="70;50;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="220" r="1" fill="#ec4899" opacity="0.5">
    <animate attributeName="cy" values="220;200;220" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
