<svg width="1200" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0118;stop-opacity:1">
        <animate attributeName="stop-color" values="#0a0118;#0d0221;#0a0118" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1a0533;stop-opacity:1">
        <animate attributeName="stop-color" values="#1a0533;#0a0118;#1a0533" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:1">
        <animate attributeName="stop-color" values="#0d0221;#1a0533;#0d0221" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ec4899;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#a855f7" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="120" fill="url(#footerBg)"/>
  <rect width="1200" height="120" fill="url(#dots)"/>

  <!-- Top animated line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Glowing orbs -->
  <circle cx="200" cy="60" r="50" fill="#7c3aed" opacity="0.07">
    <animate attributeName="r" values="50;70;50" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="60" r="60" fill="#ec4899" opacity="0.07">
    <animate attributeName="r" values="60;80;60" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Footer text -->
  <text x="600" y="52" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" font-weight="700" letter-spacing="4" fill="#a855f7" filter="url(#glow)">
    Build it. Break it. Fix it. Ship it.
    <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Sub text -->
  <text x="600" y="78" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" letter-spacing="3" fill="#64748b">
    © 2025 Muhammad Ahmad · mahmad937ak@gmail.com · Pakistan 🇵🇰
  </text>

  <!-- Floating mini particles -->
  <circle cx="100" cy="40" r="1.5" fill="#a855f7" opacity="0.7">
    <animate attributeName="cy" values="40;20;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="80" r="1" fill="#ec4899" opacity="0.6">
    <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="30" r="1.5" fill="#a855f7" opacity="0.8">
    <animate attributeName="cy" values="30;50;30" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="85" r="1" fill="#ec4899" opacity="0.5">
    <animate attributeName="cy" values="85;65;85" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Code decoration -->
  <text x="40" y="70" font-family="monospace" font-size="30" fill="#a855f7" opacity="0.12">&lt;/&gt;</text>
  <text x="1130" y="70" font-family="monospace" font-size="30" fill="#ec4899" opacity="0.12">{ }</text>

  <!-- Bottom line -->
  <rect x="0" y="118" width="1200" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
