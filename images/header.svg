<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0118;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#110033;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc" />
      <stop offset="50%" style="stop-color:#f0abfc" />
      <stop offset="100%" style="stop-color:#ec4899" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Stars animation -->
    <style>
      .star { animation: twinkle 3s infinite alternate; }
      .star:nth-child(2n) { animation-delay: 0.5s; animation-duration: 2.5s; }
      .star:nth-child(3n) { animation-delay: 1s; animation-duration: 4s; }
      .star:nth-child(5n) { animation-delay: 1.5s; animation-duration: 3.5s; }
      @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

      .pulse-ring { animation: pulseRing 3s ease-in-out infinite; }
      @keyframes pulseRing {
        0%, 100% { r: 28; opacity: 0.3; }
        50% { r: 34; opacity: 0.1; }
      }

      .name-text {
        animation: nameGlow 2s ease-in-out infinite alternate;
      }
      @keyframes nameGlow {
        0% { filter: drop-shadow(0 0 4px #a855f7); }
        100% { filter: drop-shadow(0 0 12px #ec4899) drop-shadow(0 0 24px #a855f7); }
      }

      .orbit-dot {
        animation: orbit 4s linear infinite;
        transform-origin: 450px 100px;
      }
      .orbit-dot2 {
        animation: orbit 6s linear infinite reverse;
        transform-origin: 450px 100px;
      }
      @keyframes orbit {
        from { transform: rotate(0deg) translateX(70px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
      }

      .scan-line {
        animation: scan 4s linear infinite;
      }
      @keyframes scan {
        0% { transform: translateY(-200px); opacity: 0; }
        10% { opacity: 0.15; }
        90% { opacity: 0.15; }
        100% { transform: translateY(400px); opacity: 0; }
      }

      .float-icon {
        animation: floatUp 3s ease-in-out infinite alternate;
      }
      @keyframes floatUp {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-6px); }
      }
      .float-icon2 {
        animation: floatUp 4s ease-in-out infinite alternate;
        animation-delay: 1s;
      }
      .float-icon3 {
        animation: floatUp 3.5s ease-in-out infinite alternate;
        animation-delay: 0.5s;
      }

      .line-draw {
        stroke-dasharray: 900;
        stroke-dashoffset: 900;
        animation: drawLine 3s ease forwards;
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      .fade-in-text {
        animation: fadeInUp 1.2s ease forwards;
      }
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .badge-pulse {
        animation: badgePulse 2s ease-in-out infinite;
      }
      @keyframes badgePulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.97); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Scan line effect -->
  <rect class="scan-line" x="0" y="0" width="900" height="4" fill="url(#lineGrad)" opacity="0.15"/>

  <!-- Stars -->
  <g fill="white">
    <circle class="star" cx="30" cy="15" r="1" opacity="0.7"/>
    <circle class="star" cx="80" cy="35" r="1.5" opacity="0.5"/>
    <circle class="star" cx="130" cy="12" r="1" opacity="0.8"/>
    <circle class="star" cx="200" cy="28" r="0.8" opacity="0.6"/>
    <circle class="star" cx="270" cy="18" r="1.2" opacity="0.7"/>
    <circle class="star" cx="350" cy="8" r="1" opacity="0.5"/>
    <circle class="star" cx="420" cy="22" r="1.5" opacity="0.8"/>
    <circle class="star" cx="510" cy="14" r="0.8" opacity="0.6"/>
    <circle class="star" cx="590" cy="30" r="1.2" opacity="0.7"/>
    <circle class="star" cx="650" cy="10" r="1" opacity="0.5"/>
    <circle class="star" cx="720" cy="25" r="1.5" opacity="0.8"/>
    <circle class="star" cx="800" cy="15" r="0.8" opacity="0.6"/>
    <circle class="star" cx="860" cy="32" r="1.2" opacity="0.7"/>
    <circle class="star" cx="55" cy="175" r="1" opacity="0.5"/>
    <circle class="star" cx="115" cy="185" r="0.8" opacity="0.7"/>
    <circle class="star" cx="440" cy="190" r="1" opacity="0.6"/>
    <circle class="star" cx="700" cy="178" r="1.2" opacity="0.5"/>
    <circle class="star" cx="840" cy="170" r="0.8" opacity="0.7"/>
  </g>

  <!-- Left code bracket decorations -->
  <g opacity="0.25" fill="#a855f7" font-family="JetBrains Mono, monospace" font-size="48" font-weight="bold">
    <text x="15" y="130">{</text>
  </g>
  <g opacity="0.25" fill="#ec4899" font-family="JetBrains Mono, monospace" font-size="48" font-weight="bold">
    <text x="855" y="130">}</text>
  </g>

  <!-- Glowing purple orb left -->
  <circle cx="120" cy="100" r="55" fill="#a855f7" opacity="0.04"/>
  <circle cx="120" cy="100" r="35" fill="#a855f7" opacity="0.06"/>
  <!-- Glowing pink orb right -->
  <circle cx="780" cy="100" r="55" fill="#ec4899" opacity="0.04"/>
  <circle cx="780" cy="100" r="35" fill="#ec4899" opacity="0.06"/>

  <!-- Center pulsing ring -->
  <circle class="pulse-ring" cx="450" cy="100" r="28" fill="none" stroke="#a855f7" stroke-width="1"/>
  <circle cx="450" cy="100" r="22" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>

  <!-- Top separator line animated -->
  <line class="line-draw" x1="0" y1="3" x2="900" y2="3" stroke="url(#lineGrad)" stroke-width="2"/>
  <!-- Bottom separator line animated -->
  <line class="line-draw" x1="0" y1="197" x2="900" y2="197" stroke="url(#lineGrad)" stroke-width="2"/>

  <!-- Floating icons: left side -->
  <g class="float-icon" transform="translate(100, 72)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#1a0a2e" stroke="#a855f7" stroke-width="1" opacity="0.8"/>
    <text x="6" y="22" font-size="18" opacity="0.9">⚡</text>
  </g>
  <g class="float-icon2" transform="translate(50, 118)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#1a0a2e" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
    <text x="5" y="20" font-size="16" opacity="0.9">🤖</text>
  </g>
  <g class="float-icon3" transform="translate(155, 118)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#1a0a2e" stroke="#a855f7" stroke-width="1" opacity="0.7"/>
    <text x="5" y="20" font-size="16" opacity="0.9">📱</text>
  </g>

  <!-- Floating icons: right side -->
  <g class="float-icon2" transform="translate(755, 72)">
    <rect x="0" y="0" width="32" height="32" rx="6" fill="#1a0a2e" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
    <text x="6" y="22" font-size="18" opacity="0.9">🧠</text>
  </g>
  <g class="float-icon" transform="translate(810, 118)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#1a0a2e" stroke="#a855f7" stroke-width="1" opacity="0.7"/>
    <text x="5" y="20" font-size="16" opacity="0.9">🚀</text>
  </g>
  <g class="float-icon3" transform="translate(700, 118)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#1a0a2e" stroke="#ec4899" stroke-width="1" opacity="0.7"/>
    <text x="5" y="20" font-size="16" opacity="0.9">💻</text>
  </g>

  <!-- MAIN NAME TEXT -->
  <g class="name-text">
    <text x="450" y="82" text-anchor="middle" font-family="JetBrains Mono, Segoe UI, monospace" font-size="36" font-weight="800" fill="url(#textGrad)" filter="url(#softglow)">Malik</text>
    <text x="450" y="125" text-anchor="middle" font-family="JetBrains Mono, Segoe UI, monospace" font-size="24" font-weight="600" fill="#c084fc" opacity="0.95">Full Stack · AI · App Developer</text>
  </g>

  <!-- Pakistan flag emoji + location -->
  <text class="fade-in-text" x="450" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#94a3b8" opacity="0.85">🇵🇰 Pakistan  ·  Building the Future, One Commit at a Time</text>

  <!-- Orbit dots -->
  <circle class="orbit-dot" cx="450" cy="100" r="3" fill="#a855f7" filter="url(#glow)"/>
  <circle class="orbit-dot2" cx="450" cy="100" r="2.5" fill="#ec4899" filter="url(#glow)"/>

  <!-- Corner accents -->
  <path d="M0,0 L30,0 L30,3 L3,3 L3,30 L0,30 Z" fill="#a855f7" opacity="0.5"/>
  <path d="M900,0 L870,0 L870,3 L897,3 L897,30 L900,30 Z" fill="#ec4899" opacity="0.5"/>
  <path d="M0,200 L30,200 L30,197 L3,197 L3,170 L0,170 Z" fill="#ec4899" opacity="0.5"/>
  <path d="M900,200 L870,200 L870,197 L897,197 L897,170 L900,170 Z" fill="#a855f7" opacity="0.5"/>
</svg>
