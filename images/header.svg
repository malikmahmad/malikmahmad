<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0118;stop-opacity:1">
        <animate attributeName="stop-color" values="#0a0118;#0d0221;#0a0118" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1a0533;stop-opacity:1">
        <animate attributeName="stop-color" values="#1a0533;#2d0a5e;#1a0533" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0d0221;stop-opacity:1">
        <animate attributeName="stop-color" values="#0d0221;#0a0118;#0d0221" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Glow gradient for text -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Particle gradient -->
    <radialGradient id="particleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ec4899;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a855f7" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    
    <!-- Top wave mask -->
    <clipPath id="topClip">
      <rect x="0" y="0" width="1200" height="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bgGrad)"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="200" fill="url(#grid)"/>
  
  <!-- Animated orbs -->
  <circle cx="150" cy="100" r="80" fill="#7c3aed" opacity="0.08">
    <animate attributeName="r" values="80;110;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.15;0.08" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="100" r="90" fill="#ec4899" opacity="0.08">
    <animate attributeName="r" values="90;120;90" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="50" r="60" fill="#a855f7" opacity="0.06">
    <animate attributeName="r" values="60;85;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;80;50" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles -->
  <circle cx="80" cy="40" r="2" fill="#a855f7" opacity="0.8">
    <animate attributeName="cy" values="40;20;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="160" r="1.5" fill="#ec4899" opacity="0.7">
    <animate attributeName="cy" values="160;140;160" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="30" r="2" fill="#a855f7" opacity="0.6">
    <animate attributeName="cy" values="30;10;30" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="170" r="1.5" fill="#ec4899" opacity="0.8">
    <animate attributeName="cy" values="170;150;170" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="25" r="2" fill="#a855f7" opacity="0.7">
    <animate attributeName="cy" values="25;45;25" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="150" r="1.5" fill="#ec4899" opacity="0.6">
    <animate attributeName="cy" values="150;130;150" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="60" r="2" fill="#a855f7" opacity="0.9">
    <animate attributeName="cy" values="60;40;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="130" r="1" fill="#ec4899" opacity="0.5">
    <animate attributeName="cy" values="130;110;130" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Animated accent line bottom -->
  <rect x="0" y="198" width="1200" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Code brackets decoration left -->
  <text x="30" y="130" font-family="monospace" font-size="80" fill="#a855f7" opacity="0.15" filter="url(#glow)">{</text>
  
  <!-- Code brackets decoration right -->
  <text x="1150" y="130" font-family="monospace" font-size="80" fill="#ec4899" opacity="0.15" filter="url(#glow)">}</text>

  <!-- Main title — MUHAMMAD AHMAD -->
  <text x="600" y="95" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="44" font-weight="900" letter-spacing="8" fill="url(#lineGrad)" filter="url(#strongGlow)">
    MUHAMMAD AHMAD
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="600" y="130" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="14" letter-spacing="5" fill="#94a3b8" opacity="0.85">
    Full Stack • Software Engineer • AI Developer • App Dev
  </text>

  <!-- Animated underline under name -->
  <line x1="300" y1="107" x2="900" y2="107" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5">
    <animate attributeName="x1" values="300;350;300" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="900;850;900" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Pakistan flag dots -->
  <circle cx="570" cy="148" r="3" fill="#01411C" opacity="0.8"/>
  <circle cx="582" cy="148" r="3" fill="#FFFFFF" opacity="0.8"/>
  <text x="590" y="153" font-family="monospace" font-size="11" fill="#94a3b8" opacity="0.7">Pakistan 🇵🇰</text>
</svg>
