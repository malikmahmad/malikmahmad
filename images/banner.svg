<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04001a"/>
      <stop offset="40%" style="stop-color:#0d0221"/>
      <stop offset="70%" style="stop-color:#120533"/>
      <stop offset="100%" style="stop-color:#04001a"/>
    </linearGradient>

    <!-- Purple aurora gradient -->
    <radialGradient id="aurora1" cx="25%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="75%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="aurora3" cx="50%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>

    <!-- Name text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="40%" style="stop-color:#a855f7"/>
      <stop offset="70%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>

    <!-- Subtitle gradient -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#94a3b8"/>
      <stop offset="80%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:0"/>
    </linearGradient>

    <!-- Line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="75%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#a855f7" stroke-width="0.25" opacity="0.12"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowMed" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="mainClip">
      <rect width="1200" height="280" rx="0"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="280" fill="url(#bgMain)" clip-path="url(#mainClip)"/>
  <rect width="1200" height="280" fill="url(#grid)" opacity="0.8"/>
  <rect width="1200" height="280" fill="url(#aurora1)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="280" fill="url(#aurora2)">
    <animate attributeName="opacity" values="1;0.6;1" dur="8s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="280" fill="url(#aurora3)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== TOP BORDER LINE (animated) ===== -->
  <rect x="0" y="0" width="1200" height="2.5" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- BOTTOM BORDER LINE -->
  <rect x="0" y="277.5" width="1200" height="2.5" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== FLOATING STARS / PARTICLES ===== -->
  <!-- Large slow particles -->
  <circle cx="60" cy="55" r="1.8" fill="#a855f7" opacity="0.9"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="3.2s" repeatCount="indefinite"/><animate attributeName="cy" values="55;35;55" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="220" r="1.4" fill="#ec4899" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="4.5s" repeatCount="indefinite"/><animate attributeName="cy" values="220;200;220" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="290" cy="40" r="2" fill="#c084fc" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.8s" repeatCount="indefinite"/><animate attributeName="cy" values="40;60;40" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="80" cy="180" r="1.2" fill="#f472b6" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="5.1s" repeatCount="indefinite"/><animate attributeName="cy" values="180;160;180" dur="5.1s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="250" r="1.6" fill="#a855f7" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="4.2s" repeatCount="indefinite"/><animate attributeName="cy" values="250;230;250" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="90" r="1" fill="#ec4899" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="830" cy="45" r="1.8" fill="#c084fc" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.6s" repeatCount="indefinite"/><animate attributeName="cy" values="45;25;45" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="960" cy="230" r="1.5" fill="#a855f7" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="5.3s" repeatCount="indefinite"/><animate attributeName="cy" values="230;210;230" dur="5.3s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="60" r="1.2" fill="#ec4899" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="60;40;60" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="1130" cy="180" r="1.6" fill="#f472b6" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.8s" repeatCount="indefinite"/><animate attributeName="cy" values="180;160;180" dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="1170" cy="80" r="2" fill="#a855f7" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="900" cy="250" r="1.3" fill="#ec4899" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="6.2s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="30" r="1" fill="#c084fc" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.7s" repeatCount="indefinite"/><animate attributeName="cy" values="30;50;30" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="260" r="1.4" fill="#a855f7" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="5.8s" repeatCount="indefinite"/></circle>
  <circle cx="540" cy="55" r="1.7" fill="#f472b6" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="55;35;55" dur="4s" repeatCount="indefinite"/></circle>

  <!-- ===== LEFT CODE DECORATION ===== -->
  <text x="28" y="110" font-family="'Courier New', monospace" font-size="13" fill="#a855f7" opacity="0.5" letter-spacing="1">const ahmad = {</text>
  <text x="28" y="130" font-family="'Courier New', monospace" font-size="11" fill="#64748b" opacity="0.6">  role: "Engineer",</text>
  <text x="28" y="148" font-family="'Courier New', monospace" font-size="11" fill="#64748b" opacity="0.6">  stack: "Full-Stack",</text>
  <text x="28" y="166" font-family="'Courier New', monospace" font-size="11" fill="#64748b" opacity="0.6">  ai: true,</text>
  <text x="28" y="184" font-family="'Courier New', monospace" font-size="13" fill="#a855f7" opacity="0.5">};</text>

  <!-- ===== RIGHT CODE DECORATION ===== -->
  <text x="980" y="110" font-family="'Courier New', monospace" font-size="13" fill="#ec4899" opacity="0.5" letter-spacing="1">// Pakistan 🇵🇰</text>
  <text x="980" y="130" font-family="'Courier New', monospace" font-size="11" fill="#64748b" opacity="0.6">// MNS UET Multan</text>
  <text x="980" y="148" font-family="'Courier New', monospace" font-size="11" fill="#64748b" opacity="0.6">// Open to collab</text>
  <text x="980" y="166" font-family="'Courier New', monospace" font-size="11" fill="#64748b" opacity="0.6">// Building future</text>
  <text x="980" y="184" font-family="'Courier New', monospace" font-size="11" fill="#ec4899" opacity="0.5">// Ship it 🚀</text>

  <!-- ===== MAIN GLOW ORB behind name ===== -->
  <ellipse cx="600" cy="130" rx="280" ry="80" fill="#7c3aed" opacity="0.07">
    <animate attributeName="rx" values="280;320;280" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.07;0.13;0.07" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ===== NAME ===== -->
  <!-- Shadow layer -->
  <text x="600" y="115" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="54" font-weight="900" letter-spacing="10" fill="#a855f7" opacity="0.15" filter="url(#glowSoft)">MUHAMMAD AHMAD</text>
  <!-- Main name -->
  <text x="600" y="115" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="54" font-weight="900" letter-spacing="10" fill="url(#nameGrad)" filter="url(#glowStrong)">
    MUHAMMAD AHMAD
    <animate attributeName="opacity" values="0.92;1;0.92" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- ===== ANIMATED UNDERLINE ===== -->
  <rect x="200" y="127" width="800" height="1.5" fill="url(#lineGrad)" opacity="0.7">
    <animate attributeName="x" values="200;250;200" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="width" values="800;700;800" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== TAGLINE ===== -->
  <text x="600" y="162" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" letter-spacing="5" fill="url(#subGrad)" filter="url(#glowMed)">
    Full Stack Developer  ·  Software Engineer  ·  AI Developer  ·  App Dev
  </text>

  <!-- ===== PILL BADGES ===== -->
  <!-- Web -->
  <rect x="298" y="185" width="78" height="24" rx="12" fill="#a855f7" opacity="0.18"/>
  <rect x="298" y="185" width="78" height="24" rx="12" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
  <text x="337" y="201" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#c084fc" letter-spacing="1">🌐 Web</text>

  <!-- Mobile -->
  <rect x="388" y="185" width="90" height="24" rx="12" fill="#7c3aed" opacity="0.18"/>
  <rect x="388" y="185" width="90" height="24" rx="12" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="433" y="201" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" letter-spacing="1">📱 Mobile</text>

  <!-- AI -->
  <rect x="490" y="185" width="78" height="24" rx="12" fill="#ec4899" opacity="0.18"/>
  <rect x="490" y="185" width="78" height="24" rx="12" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.6"/>
  <text x="529" y="201" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#f472b6" letter-spacing="1">🤖 AI/ML</text>

  <!-- Desktop -->
  <rect x="580" y="185" width="96" height="24" rx="12" fill="#a855f7" opacity="0.18"/>
  <rect x="580" y="185" width="96" height="24" rx="12" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
  <text x="628" y="201" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#c084fc" letter-spacing="1">🖥 Desktop</text>

  <!-- Freelance -->
  <rect x="688" y="185" width="100" height="24" rx="12" fill="#7c3aed" opacity="0.18"/>
  <rect x="688" y="185" width="100" height="24" rx="12" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <text x="738" y="201" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" letter-spacing="1">💼 Freelance</text>

  <!-- Open Source -->
  <rect x="800" y="185" width="108" height="24" rx="12" fill="#ec4899" opacity="0.18"/>
  <rect x="800" y="185" width="108" height="24" rx="12" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.6"/>
  <text x="854" y="201" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#f472b6" letter-spacing="1">⭐ Open Source</text>

  <!-- ===== BOTTOM TAGLINE ===== -->
  <text x="600" y="245" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="13" letter-spacing="4" fill="#a855f7" opacity="0.7" filter="url(#glowMed)">
    " Build it. Break it. Fix it. Ship it. "
    <animate attributeName="opacity" values="0.7;1;0.7" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- ===== CORNER DECORATIONS ===== -->
  <!-- Top-left bracket -->
  <path d="M 10 20 L 10 10 L 20 10" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Top-right bracket -->
  <path d="M 1180 20 L 1180 10 L 1170 10" stroke="#ec4899" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Bottom-left bracket -->
  <path d="M 10 260 L 10 270 L 20 270" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Bottom-right bracket -->
  <path d="M 1180 260 L 1180 270 L 1170 270" stroke="#ec4899" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
